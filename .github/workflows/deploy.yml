name: Deploy Vite site to Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GIT_SUBMODULE_RECURSE: false

    steps:
      - name: Configure git to ignore submodules
        run: |
          git config --global submodule.recurse false
          git config --global submodule.active false

      - uses: actions/checkout@v4

      - name: Remove any submodule config
        run: |
          rm -f .gitmodules
          rm -rf .git/modules
          git config --global --unset submodule.kawsay-pool-pro.url || true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: cd kawsay-pool-pro && npm install
      - run: cd kawsay-pool-pro && npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./kawsay-pool-pro/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/deploy-pages@v4
